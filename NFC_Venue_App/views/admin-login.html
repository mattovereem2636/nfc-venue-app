<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — {{VENUE_NAME}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent:  #{{ACCENT_COLOR}};
      --text:    #1a1a1a;
      --muted:   #6b7280;
      --border:  #e5e5e0;
      --surface: #f4f4f1;
      --card:    #ffffff;
      --red:     #dc2626;
      --red-bg:  #fef2f2;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--surface);
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100dvh;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px 36px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }
    .logo {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .logo svg { width: 26px; height: 26px; fill: white; }
    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 26px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .error-box {
      display: {{SHOW_ERROR}};
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--red-bg);
      border: 1px solid #fca5a5;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--red);
    }
    .error-box svg { width: 18px; height: 18px; fill: var(--red); flex-shrink: 0; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: var(--text);
      background: #fafaf8;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-text-security: disc;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
      background: white;
    }
    .toggle-vis {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      display: flex;
      align-items: center;
    }
    .toggle-vis svg { width: 18px; height: 18px; fill: currentColor; }
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .submit-btn:hover  { opacity: 0.92; }
    .submit-btn:active { transform: scale(0.99); }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }
    .security-note {
      margin-top: 28px;
      padding: 12px 14px;
      background: #f4f4f1;
      border-radius: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 2.18l7 3.12V11c0 4.54-3.13 8.79-7 9.93-3.87-1.14-7-5.39-7-9.93V6.3l7-3.12z"/></svg>
    </div>
    <h1>Admin Access</h1>
    <p class="subtitle">{{VENUE_NAME}} &mdash; NFC Document Manager</p>

    <!-- Error message -->
    <div class="error-box">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      {{ERROR_MSG}}
    </div>

    <form method="POST" action="/admin/login" autocomplete="off">
      <label for="passcode">Admin Passcode</label>
      <div class="input-wrap">
        <input
          type="password"
          id="passcode"
          name="passcode"
          autocomplete="current-password"
          required
          autofocus
          placeholder="Enter passcode"
          spellcheck="false"
        >
        <button type="button" class="toggle-vis" onclick="toggleVis()" aria-label="Toggle visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
        </button>
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
    </form>

    <a href="/" class="back-link">← Back to guest page</a>

    <div class="security-note">
      🔒 This page is rate-limited. Five failed attempts will lock access for 15 minutes. All login activity is logged.
    </div>
  </div>

  <script>
    function toggleVis() {
      const input = document.getElementById('passcode');
      const icon  = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94L16.52 16.52 7.34 7.34 5.92 5.92 4.51 4.51 3.09 3.09 1.68 1.68 0 3.36l4.9 4.9C3.89 9.86 3 10.93 2 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42 3.7 3.7 1.41-1.41L17.94 17.94zM12 17c-2.76 0-5-2.24-5-5 0-.77.18-1.5.49-2.14l1.57 1.57c-.03.18-.06.38-.06.57 0 1.66 1.34 3 3 3 .19 0 .38-.03.57-.07l1.57 1.57C13.5 16.82 12.77 17 12 17zm4.84-.84l-1.4-1.4-.7-.7-3.8-3.8-.7-.7-1.4-1.4L7.3 7.3C8.14 6.49 9 6 12 6c2.76 0 5 2.24 5 5 0 1.05-.33 2.03-.88 2.84z"/>';
      } else {
        input.type = 'password';
        icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
      }
    }
  </script>
</body>
</html>
